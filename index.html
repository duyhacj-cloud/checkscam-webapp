<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Bán Tài Khoản</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000);
            margin: 0; padding: 16px;
        }
        .container {
            background-color: var(--tg-theme-bg-color, #fff);
            border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; margin-top: 0; color: var(--tg-theme-text-color, #333); }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; color: var(--tg-theme-hint-color, #666); }
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 8px; box-sizing: border-box; font-size: 15px;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        textarea { resize: vertical; height: 80px; }
        .btn-submit {
            width: 100%; padding: 14px; background-color: #2481cc;
            color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 ĐĂNG BÁN MẶT HÀNG</h2>
        
        <div class="form-group">
            <label>Tên mặt hàng:</label>
            <input type="text" id="itemName" placeholder="Nhập tên mặt hàng...">
        </div>

        <div class="form-group">
            <label>Giá tiền (VNĐ):</label>
            <input type="text" id="itemPrice" placeholder="VD: 200,000">
        </div>

        <div class="form-group">
            <label>Ghi chú (Giao dịch ra sao...):</label>
            <textarea id="itemNote" placeholder="Giao dịch trực tiếp hoặc trung gian..."></textarea>
        </div>

        <button class="btn-submit" id="submitBtn">ĐĂNG BÀI LÊN CHỢ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        document.getElementById('submitBtn').addEventListener('click', () => {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const note = document.getElementById('itemNote').value;

            if(!name || !price) {
                tg.showAlert("Vui lòng nhập Tên và Giá tiền!");
                return;
            }

            // Gói dữ liệu thành chuỗi JSON
            const data = JSON.stringify({
                action: "POST_ITEM",
                name: name,
                price: price,
                note: note
            });

            // Gửi dữ liệu ngầm về cho Bot C# và tự động đóng Web
            tg.sendData(data); 
        });
    </script>
</body>
</html>
