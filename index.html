<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Bán Sản Phẩm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #090a0f;
            --panel-bg: rgba(16, 18, 27, 0.85);
            --text-main: #e2e8f0;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            /* Tạo ánh sáng nền nhẹ 2 góc */
            background-image: 
                radial-gradient(circle at top right, rgba(188, 19, 254, 0.15), transparent 40%),
                radial-gradient(circle at bottom left, rgba(0, 243, 255, 0.15), transparent 40%);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-card {
            background: var(--panel-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 30px 24px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            /* Hiệu ứng bóng đổ Neon */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 243, 255, 0.1) inset;
            backdrop-filter: blur(10px);
            /* Animation trượt lên khi mở */
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: translateY(30px);
            opacity: 0;
            box-sizing: border-box;
        }

        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .header p {
            margin: 8px 0 0 0;
            font-size: 15px;
            color: #94a3b8;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #334155;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        input::placeholder, textarea::placeholder {
            color: #475569;
        }

        /* Hiệu ứng phát sáng khi bấm vào ô nhập liệu */
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 12px rgba(188, 19, 254, 0.4);
            background-color: rgba(0, 0, 0, 0.8);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* NÚT BẤM GAMING */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            /* Animation nhịp đập ánh sáng */
            animation: pulseGlow 2s infinite;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            animation: none;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.8);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
            50% { box-shadow: 0 0 25px rgba(0, 243, 255, 0.6); }
            100% { box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
        }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="header">
            <h2>🛒 ĐĂNG BÁN MẶT HÀNG</h2>
            <p>Nhập thông tin giao dịch của bạn</p>
        </div>
        
        <div class="form-group">
            <label>Tên mặt hàng</label>
            <input type="text" id="itemName" placeholder="VD: Acc Blox Fruit Max Level...">
        </div>

        <div class="form-group">
            <label>Giá tiền (VNĐ)</label>
            <input type="text" id="itemPrice" placeholder="VD: 150.000">
        </div>

        <div class="form-group">
            <label>Ghi chú (Chi tiết)</label>
            <textarea id="itemNote" placeholder="- Trắng thông tin&#10;- Giao dịch qua Admin..."></textarea>
        </div>
        
        <button class="btn-submit" id="submitBtn">XÁC NHẬN ĐẨY BÀI</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Bật chế độ Full màn hình Telegram

        document.getElementById('submitBtn').addEventListener('click', () => {
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const note = document.getElementById('itemNote').value.trim();
            
            if(!name || !price) {
                // Cảnh báo rung lắc (Haptic Feedback) của Telegram
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("⚠️ STOP! Vui lòng không để trống Tên và Giá tiền!");
                return;
            }
            
            // Báo rung thành công
            tg.HapticFeedback.notificationOccurred('success');

            const data = { action: "POST_ITEM", name: name, price: price, note: note };
            tg.sendData(JSON.stringify(data));
            
            // Đóng giao diện Web ngay lập tức
            tg.close(); 
        });
    </script>
</body>
</html>
