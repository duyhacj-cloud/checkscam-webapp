<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Bán Sản Phẩm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: var(--tg-theme-secondary-bg-color, #f3f4f6);
            --card-bg: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #1f2937);
            --hint-color: var(--tg-theme-hint-color, #9ca3af);
            --btn-color: var(--tg-theme-button-color, #3b82f6);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --border-color: #e5e7eb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .app-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-color);
        }
        .header p {
            margin: 4px 0 0 0;
            font-size: 13px;
            color: var(--hint-color);
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--btn-color);
            background-color: var(--card-bg);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--btn-color);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-submit:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="header">
            <h2>📦 ĐĂNG BÁN MẶT HÀNG</h2>
            <p>Vui lòng điền thông tin chi tiết</p>
        </div>
        
        <div class="form-group">
            <label>Tên mặt hàng:</label>
            <input type="text" id="itemName" placeholder="VD: Acc Blox Fruit Max Level...">
        </div>

        <div class="form-group">
            <label>Giá tiền (VNĐ):</label>
            <input type="text" id="itemPrice" placeholder="VD: 150.000">
        </div>

        <div class="form-group">
            <label>Ghi chú (Giao dịch ra sao...):</label>
            <textarea id="itemNote" placeholder="- Trắng thông tin&#10;- Giao dịch trung gian..."></textarea>
        </div>
        
        <button class="btn-submit" id="submitBtn">ĐẨY BÀI LÊN CHỢ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('submitBtn').addEventListener('click', () => {
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const note = document.getElementById('itemNote').value.trim();
            
            if(!name || !price) {
                tg.showAlert("⚠️ Bạn không được để trống Tên mặt hàng và Giá tiền!");
                return;
            }
            
            const data = { action: "POST_ITEM", name: name, price: price, note: note };
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
